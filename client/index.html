<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillHub - OpenClaw Skills Registry</title>
    <meta name="description" content="Discover, share, and install AI agent skills. SkillHub is the registry for OpenClaw skills — browse 1000+ verified skills, publish your own, and supercharge your agents." />
    <meta name="keywords" content="OpenClaw, AI skills, agent skills, skill registry, AI agents, SkillHub" />
    <meta name="author" content="SkillHub" />
    <meta name="google-site-verification" content="DTPHdX4sOib2iBdqTfhzl76mhC5NnGHWtWdJMZnFt38" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="canonical" href="https://skillhub.space/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SkillHub" />
    <meta property="og:title" content="SkillHub - OpenClaw Skills Registry" />
    <meta property="og:description" content="Discover, share, and install AI agent skills. Browse 1000+ verified skills, publish your own, and supercharge your OpenClaw agents." />
    <meta property="og:url" content="https://skillhub.space/" />
    <meta property="og:image" content="https://skillhub.space/icon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SkillHub - OpenClaw Skills Registry" />
    <meta name="twitter:description" content="Discover, share, and install AI agent skills. Browse 1000+ verified skills, publish your own, and supercharge your OpenClaw agents." />
    <meta name="twitter:image" content="https://skillhub.space/icon.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SkillHub",
      "url": "https://skillhub.space",
      "description": "The OpenClaw Skills Registry — discover, share, and install AI agent skills",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://skillhub.space/browse?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
