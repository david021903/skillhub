openapi: 3.1.0
info:
  title: SkillBook API
  version: 0.1.0
  description: Blueprint OpenAPI spec for a GitHub-like skills registry.
servers:
  - url: https://api.skillbook.example.com
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }

  /v1/repos:
    get:
      summary: List repos
      parameters:
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200': { description: Repos }
    post:
      summary: Create repo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/api/CreateRepoRequest.json
      responses:
        '201': { description: Created }

  /v1/repos/{owner}/{repo}/pulls:
    post:
      summary: Create pull request
      parameters:
        - in: path
          name: owner
          required: true
          schema: { type: string }
        - in: path
          name: repo
          required: true
         schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/api/CreatePullRequest.json
      responses:
        '201': { description: PR created }

  /v1/repos/{owner}/{repo}/publish:
    post:
      summary: Publish a version
      parameters:
        - in: path
          name: owner
          required: true
          schema: { type: string }
        - in: path
          name: repo
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/api/PublishRequest.json
      responses:
        '202': { description: Publish started }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
